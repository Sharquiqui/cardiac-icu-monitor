<svg width="680" height="370" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg" role="img">
<title>App 5 system architecture</title>
<desc>A four-task pipeline on Core 1 (producer, consumer, coordinator, responder) connected by a queue, event group, and task notification, with a button ISR notifying the responder directly, and an independent monitor task on Core 0.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="470" y="40" width="140" height="34" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="540" y="57" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Button ISR</text>

<path d="M540 74 L550 130" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<rect x="40" y="95" width="600" height="120" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="60" y="115" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Core 1 — processing pipeline</text>

<rect x="70" y="130" width="120" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="130" y="150" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Producer</text>
<text x="130" y="167" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">Samples ECG</text>

<rect x="210" y="130" width="120" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="270" y="150" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Consumer</text>
<text x="270" y="167" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">Processes data</text>

<rect x="350" y="130" width="120" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="410" y="150" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Coordinator</text>
<text x="410" y="167" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">Checks readiness</text>

<rect x="490" y="130" width="120" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="550" y="150" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Responder</text>
<text x="550" y="167" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">Alarm &amp; output</text>

<line x1="190" y1="158" x2="210" y2="158" stroke="#1D9E75" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="330" y1="158" x2="350" y2="158" stroke="#BA7517" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="470" y1="158" x2="490" y2="158" stroke="#D85A30" stroke-width="2" marker-end="url(#arrow)"/>

<line x1="340" y1="215" x2="340" y2="245" stroke="#5E6C75" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text x="350" y="233" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#43555F">status</text>

<rect x="40" y="245" width="600" height="70" rx="16" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="60" y="267" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Core 0 — monitoring</text>

<rect x="270" y="277" width="140" height="30" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="292" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">Monitor task</text>

<circle cx="180" cy="335" r="5" fill="#1D9E75"/>
<text x="192" y="339" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#43555F">Queue</text>
<circle cx="300" cy="335" r="5" fill="#BA7517"/>
<text x="312" y="339" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#43555F">Event group</text>
<circle cx="430" cy="335" r="5" fill="#D85A30"/>
<text x="442" y="339" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#43555F">Notification</text>
</svg>
